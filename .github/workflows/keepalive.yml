# Pings the Render health endpoint every 14 minutes to prevent the free-tier
# dyno from spinning down (Render spins down after 15 minutes of inactivity).
#
# Setup: add your deployed URL as a GitHub Actions secret named RENDER_URL.
# Example value: https://stresslab.onrender.com
# Go to: Settings → Secrets and variables → Actions → New repository secret

name: Render keepalive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_URL }}/api/health")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS"
          fi
