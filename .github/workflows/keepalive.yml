# Pings the Render health endpoint every 10 minutes to prevent the free-tier
# service from spinning down (Render spins down after 15 minutes of inactivity).
# Using 10-minute intervals instead of 14 because GitHub Actions cron can be
# delayed by several minutes, which would push a 14-minute schedule past the
# 15-minute inactivity threshold.
#
# Setup: add your deployed URL as a GitHub Actions secret named RENDER_URL.
# Example value: https://stresslab.onrender.com
# Go to: Settings → Secrets and variables → Actions → New repository secret

name: Render keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret is configured
        run: |
          if [ -z "${{ secrets.RENDER_URL }}" ]; then
            echo "ERROR: RENDER_URL secret is not set."
            echo "Go to GitHub → Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: RENDER_URL  Value: https://stresslab.onrender.com"
            exit 1
          fi
          echo "RENDER_URL is configured: ${{ secrets.RENDER_URL }}"

      - name: Ping health endpoint
        run: |
          # Render free-tier cold starts can take 60-90s, so we retry once
          # after an initial generous timeout.
          for attempt in 1 2; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 "${{ secrets.RENDER_URL }}/api/health")
            echo "Attempt $attempt — response status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "OK: service is alive"
              exit 0
            fi
            if [ "$attempt" -eq 1 ]; then
              echo "First attempt failed (status $STATUS), retrying in 10s..."
              sleep 10
            fi
          done
          echo "ERROR: service did not respond after 2 attempts (last status: $STATUS)"
          exit 1
