services:
  - type: web
    name: stresslab
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt && cd frontend && npm ci && npm run build
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false          # Use the Supabase session-mode pooler URL (port 5432, IPv4)
      - key: CORS_ORIGINS
        value: https://stresslab.onrender.com
      - key: RESEND_API_KEY
        sync: false          # get from resend.com/api-keys
      - key: APP_URL
        value: https://stresslab.onrender.com
